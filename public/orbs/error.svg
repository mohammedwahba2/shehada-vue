<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>

    @keyframes corePulse {
        0%, 100% { opacity: 0.8; transform: scale(0.9); filter: brightness(1); }
        50% { opacity: 1; transform: scale(1.1); filter: brightness(1.3); }
    }

    @keyframes blobFloat {
        0%, 100% { transform: rotate(0deg) translate(0, 0); }
        33% { transform: rotate(2deg) translate(-3px, 2px); }
        66% { transform: rotate(-2deg) translate(2px, -3px); }
    }

    @keyframes slowSphereRotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .anim-core { animation: corePulse 2s ease-in-out infinite; transform-origin: 120px 120px; }
    .anim-blob-1 { animation: blobFloat 7s ease-in-out infinite; transform-origin: center; }
    .anim-blob-2 { animation: blobFloat 9s ease-in-out infinite reverse; transform-origin: center; }
    .anim-bg-rotate { animation: slowSphereRotate 30s linear infinite; transform-origin: 120px 120px; }
</style>


