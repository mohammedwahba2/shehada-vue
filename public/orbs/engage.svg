<svg width="270" height="270" viewBox="0 0 270 270" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
    @keyframes irisRotateCW {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
    @keyframes irisRotateCCW {
        from { transform: rotate(0deg); }
        to { transform: rotate(-360deg); }
    }
    @keyframes breath {
        0%, 100% { opacity: 0.7; transform: scale(1); filter: brightness(1); }
        50% { opacity: 1; transform: scale(1.03); filter: brightness(1.2); }
    }

    .layer-1 { animation: irisRotateCW 50s linear infinite; transform-origin: 135px 135px; }
    .layer-2 { animation: irisRotateCCW 40s linear infinite; transform-origin: 135px 135px; }
    .main-wrapper { animation: breath 4s ease-in-out infinite; transform-origin: 135px 135px; }
</style>

